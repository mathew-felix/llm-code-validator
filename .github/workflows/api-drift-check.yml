name: API Drift Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: llm-code-validator check . --format github
